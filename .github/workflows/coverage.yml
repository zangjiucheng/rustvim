name: Code Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@1.83.0
      with:
        components: llvm-tools-preview
        
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
      
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Run tests with coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      
    - name: Upload coverage to Codecov
      id: codecov_upload
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        
    - name: Post Coverage Report Summary  
      if: always()
      run: |
        if [ "${{ steps.codecov_upload.outcome }}" = "success" ]; then
          echo "✅ Coverage uploaded successfully!"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🔗 View full report at: https://codecov.io/gh/zangjiucheng/rustvim/pull/${{ github.event.pull_request.number }}"
          else
            echo "🔗 View full report at: https://codecov.io/gh/zangjiucheng/rustvim"
          fi
        else
          echo "❌ Coverage test wrong"
        fi
