name: Code Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@1.83.0
      with:
        components: llvm-tools-preview
        
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
      
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Run tests with coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      
    - name: Upload coverage to Codecov
      id: codecov_upload
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        
    - name: Post Coverage Report Summary  
      if: always()
      run: |
        echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.codecov_upload.outcome }}" = "success" ]; then
          echo "✅ Coverage uploaded successfully!"
          echo "### ✅ Coverage Upload Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REPORT_URL="https://codecov.io/gh/zangjiucheng/rustvim/pull/${{ github.event.pull_request.number }}"
            echo "🔗 View full report at: $REPORT_URL"
            echo "📋 **Pull Request Coverage Report**" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View detailed coverage report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
          else
            REPORT_URL="https://codecov.io/gh/zangjiucheng/rustvim"
            echo "🔗 View full report at: $REPORT_URL"
            echo "📋 **Branch Coverage Report**" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View detailed coverage report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ Coverage test wrong"
          echo "### ❌ Coverage Upload Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The coverage upload to Codecov failed. Please check the logs above for details." >> $GITHUB_STEP_SUMMARY
        fi
