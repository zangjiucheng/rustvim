name: Build RustVim

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
      
    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
          ${{ runner.os }}-
          
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run tests
      run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }}-${{ matrix.build_type }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            target: x86_64-unknown-linux-gnu
            build_type: debug
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            target: x86_64-unknown-linux-gnu
            build_type: release
          # macOS builds
          - os: macos-latest
            artifact_suffix: macos-x86_64
            target: x86_64-apple-darwin
            build_type: debug
          - os: macos-latest
            artifact_suffix: macos-x86_64
            target: x86_64-apple-darwin
            build_type: release
          - os: macos-latest
            artifact_suffix: macos-aarch64
            target: aarch64-apple-darwin
            build_type: debug
          - os: macos-latest
            artifact_suffix: macos-aarch64
            target: aarch64-apple-darwin
            build_type: release
          # Windows builds
          - os: windows-latest
            artifact_suffix: windows-x86_64
            target: x86_64-pc-windows-gnu
            build_type: debug
          - os: windows-latest
            artifact_suffix: windows-x86_64
            target: x86_64-pc-windows-gnu
            build_type: release
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Add target
      if: matrix.target != ''
      run: rustup target add ${{ matrix.target }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target/${{ matrix.target }}
        key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-target-${{ matrix.target }}-
          ${{ runner.os }}-target-

    - name: Build with cargo
      run: |
        if [ '${{ matrix.build_type }}' = 'release' ]; then
          cargo build --release --target ${{ matrix.target }}
        else
          cargo build --target ${{ matrix.target }}
        fi

    - name: Package the binary
      shell: bash
      run: |
        CRATE_NAME=$(cargo metadata --no-deps --format-version=1 \
                     | jq -r '.packages[0].name')
        
        if [ '${{ matrix.build_type }}' = 'release' ]; then
          BIN_PATH="target/${{ matrix.target }}/release/$CRATE_NAME"
          ARCHIVE="${CRATE_NAME}-${{ matrix.artifact_suffix }}-release.zip"
        else
          BIN_PATH="target/${{ matrix.target }}/debug/$CRATE_NAME"
          ARCHIVE="${CRATE_NAME}-${{ matrix.artifact_suffix }}-debug.zip"
        fi
        
        if [ '${{ runner.os }}' = 'Windows' ]; then
          7z a "$ARCHIVE" "$BIN_PATH.exe" "$BIN_PATH.exe.pdb" 2>/dev/null || true
        else
          tar -czf "$ARCHIVE" "$BIN_PATH" 2>/dev/null || tar -czf "$ARCHIVE" -C target . 2>/dev/null || echo "Packaging skipped"
        fi
        echo "Created $ARCHIVE"
        echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_ENV
        echo "BINARY_NAME=$CRATE_NAME" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_suffix }}-${{ matrix.build_type }}
        path: ${{ env.ARCHIVE_NAME }}

  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: '*'
        merge-multiple: true
        
    - name: List artifacts
      run: ls -la artifacts/
