name: Build RustVim

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
      
    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-
          ${{ runner.os }}-
          
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run tests
      run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }}-${{ matrix.build_type }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            target: x86_64-unknown-linux-gnu
            build_type: debug
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            target: x86_64-unknown-linux-gnu
            build_type: release
          # macOS Intel builds
          - os: macos-latest
            artifact_suffix: macos-x86_64
            target: x86_64-apple-darwin
            build_type: debug
          - os: macos-latest
            artifact_suffix: macos-x86_64
            target: x86_64-apple-darwin
            build_type: release
          # macOS Apple Silicon builds
          - os: macos-latest
            artifact_suffix: macos-aarch64
            target: aarch64-apple-darwin
            build_type: debug
          - os: macos-latest
            artifact_suffix: macos-aarch64
            target: aarch64-apple-darwin
            build_type: release
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Add target
      if: matrix.target != ''
      run: rustup target add ${{ matrix.target }}

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target/${{ matrix.target }}
        key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-target-${{ matrix.target }}-
          ${{ runner.os }}-target-

    - name: Build with cargo (debug)
      if: matrix.build_type == 'debug'
      run: cargo build --target ${{ matrix.target }}

    - name: Build with cargo (release)
      if: matrix.build_type == 'release'
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package the binary
      shell: bash
      run: |
        CRATE_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name')
        if [ '${{ matrix.build_type }}' = 'release' ]; then
          BIN_PATH="target/${{ matrix.target }}/release/$CRATE_NAME"
          tar -czf "${CRATE_NAME}-${{ matrix.artifact_suffix }}-release.tar.gz" "$BIN_PATH"
        else
          BIN_PATH="target/${{ matrix.target }}/debug/$CRATE_NAME"
          tar -czf "${CRATE_NAME}-${{ matrix.artifact_suffix }}-debug.tar.gz" "$BIN_PATH"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_suffix }}-${{ matrix.build_type }}
        path: |
          *.zip
          *.tar.gz

  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: '*'
        merge-multiple: true
        
    - name: List artifacts
      run: ls -la artifacts/
